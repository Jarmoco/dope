<div class="header-pair config-row">
  <input type="text" value="{key}" name="{key}" placeholder="Name"
         hx-put="/api/html/config/domain/{domain_url}/{ty_lower}/headers/key" hx-trigger="change" hx-target="closest .domain-card" hx-swap="outerHTML">
  <span>=</span>
  <input type="text" value="{val}" name="{key}" placeholder="Value"
         hx-put="/api/html/config/domain/{domain_url}/{ty_lower}/headers/val" hx-trigger="change" hx-target="closest .domain-card" hx-swap="outerHTML">
  <button class="btn btn-danger btn-sm" hx-delete="/api/html/config/domain/{domain_url}/{ty_lower}/headers/{key_url}" hx-target="closest .domain-card" hx-swap="outerHTML">x</button>
</div>
