<h2>Configuration</h2>
<div class="config-section">
  <h3>Server</h3>
  <div class="config-row">
    <label>Port</label>
    <input type="number" id="cfg-port" name="value" value="{port}" min="1" max="65535"
           hx-put="/api/html/config/server/port" hx-trigger="change" hx-target="#app" hx-swap="innerHTML">
  </div>
  <div class="config-row">
    <label>Pause</label>
    <input type="checkbox" id="cfg-pause" name="cfg-pause"{paused}
           hx-put="/api/html/config/server/pause" hx-trigger="change" hx-target="#app" hx-swap="innerHTML">
  </div>
</div>
<div class="config-section">
  <h3>Domain Rules</h3>
  <div id="domain-list">{domain_cards}</div>
  <div id="add-domain-area" style="margin-top:12px">
    <button id="add-domain-btn" class="btn btn-primary btn-sm"
            onclick="this.style.display='none';document.getElementById('add-domain-form').style.display='inline-flex';document.getElementById('add-domain-input').focus()">
      + Add Domain Rule
    </button>
    <form id="add-domain-form" style="display:none;gap:0.5rem;align-items:center"
          hx-post="/api/html/config/domain"
          hx-target="#app"
          hx-swap="innerHTML">
      <input type="text" id="add-domain-input" name="domain" placeholder="e.g. google.com" style="flex:1;min-width:200px" autofocus>
      <button type="submit" class="btn btn-primary btn-sm">Add</button>
      <button type="button" class="btn btn-sm" onclick="document.getElementById('add-domain-btn').style.display='';document.getElementById('add-domain-form').style.display='none'">Cancel</button>
    </form>
  </div>
</div>
<script>
function toggleCard(header) {
  var card = header.parentElement;
  var body = card.querySelector('.domain-body');
  var toggle = header.querySelector('.domain-toggle');
  if (body.style.display === 'none') {
    body.style.display = 'block';
    toggle.textContent = '\u25BC';
  } else {
    body.style.display = 'none';
    toggle.textContent = '\u25B6';
  }
}
</script>
